<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AetherVibe | High-Tech Weather</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar: Search & Current Weather -->
      <aside class="sidebar">
        <div class="search-box">
          <input
            type="text"
            id="city-input"
            placeholder="Search city or zip..."
          />
          <button id="search-btn"><i class="fas fa-search"></i></button>
          <button id="locate-btn"><i class="fas fa-location-dot"></i></button>
        </div>

        <div class="current-weather-display">
          <!-- Dynamic Weather Icon -->
          <div class="weather-icon-lg"></div>
          <h1 class="temperature">--°C</h1>
          <h2 class="weather-condition">---</h2>
          <div class="location-name">-- , --</div>
          <div class="date-time">---</div>
        </div>
      </aside>

      <!-- Main Content: Forecasts and Advanced Metrics -->
      <main class="main-content">
        <header>
          <h2>Holistic Weather Intelligence</h2>
        </header>

        <!-- Grid for Advanced Metrics -->
        <section class="metrics-grid">
          <div class="metric-card">
            <i class="fas fa-temperature-high"></i>
            <span>Feels Like</span>
            <h3 id="feels-like">-- °C</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-arrow-up"></i>
            <span>Max Temp</span>
            <h3 id="temp-max">-- °C</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-arrow-down"></i>
            <span>Min Temp</span>
            <h3 id="temp-min">-- °C</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-wind"></i>
            <span>Wind Speed</span>
            <h3 id="wind-speed">-- m/s</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-tint"></i>
            <span>Humidity</span>
            <h3 id="humidity">-- %</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-gauge-high"></i>
            <span>Pressure</span>
            <h3 id="pressure">-- hPa</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-eye"></i>
            <span>Visibility</span>
            <h3 id="visibility">-- km</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-cloud"></i>
            <span>Cloud Cover</span>
            <h3 id="clouds">-- %</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-compass"></i>
            <span>Wind Direction</span>
            <h3 id="wind-dir">-- °</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-sun"></i>
            <span>Sunrise</span>
            <h3 id="sunrise">--</h3>
          </div>

          <div class="metric-card">
            <i class="fas fa-moon"></i>
            <span>Sunset</span>
            <h3 id="sunset">--</h3>
          </div>
        </section>

        <!-- Hourly Forecast Section -->
        <section class="forecast-section">
          <h3>Hourly Forecast</h3>
          <div class="hourly-grid" id="hourly-container">
            <!-- Hourly cards will be dynamically injected via JS -->
          </div>
        </section>

        <!-- Daily Forecast Section -->
        <section class="forecast-section">
          <h3>5-Day Forecast</h3>
          <div class="daily-list" id="daily-container">
            <!-- Daily cards will be dynamically injected via JS -->
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
